<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #232F3E, #FF9900);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.2em; opacity: 0.9; }
        .version { color: #FF9900; font-weight: bold; }
        .environment { color: #00FF88; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Microservices Application</h1>
        <p>Version: <span class="version">1.1.0</span></p>
        <p>Environment: <span class="environment">Development</span></p>
        <p>Deployed via AWS CodePipeline</p>
        <p>Build Time: <span id="buildtime">2024-01-01T00:00:00Z</span></p>
    </div>
</body>
</html>
